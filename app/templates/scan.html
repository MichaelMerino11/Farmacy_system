<!DOCTYPE html>
<html>

<head>
    <title>Escanear muestra</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 60px;
        }

        input {
            font-size: 28px;
            padding: 12px;
            width: 420px;
            text-align: center;
        }

        .msg {
            margin-top: 20px;
            font-size: 18px;
            color: red;
        }
    </style>

</head>

<body>

    <h2>Escanear muestra</h2>

    <input id="codigo" autofocus placeholder="Escanee código..." />

    <div id="msg" class="msg"></div>

    <script>

        const input = document.getElementById("codigo")
        const msg = document.getElementById("msg")

        input.focus()

        let timer = null

        input.addEventListener("input", () => {

            clearTimeout(timer)

            timer = setTimeout(async () => {

                const codigo = input.value.trim()

                if (!codigo) return

                try {

                    const response = await fetch("/buscar/" + codigo)

                    if (response.redirected) {
                        window.location.href = response.url
                        return
                    }

                    if (response.status === 404) {
                        msg.innerText = "⚠️ Muestra no encontrada"
                    }

                } catch (err) {
                    msg.innerText = "Error al buscar"
                }

                input.value = ""
                input.focus()

            }, 300)

        })

    </script>

</body>

</html>
