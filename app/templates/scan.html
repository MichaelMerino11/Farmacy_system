<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Escanear muestra</title>

<style>
body {
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #f2f2f2;
}

.box {
    background: white;
    padding: 40px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input {
    font-size: 20px;
    padding: 10px;
    width: 300px;
    text-align: center;
}
</style>

<script>
function buscarCodigo(event) {
    if (event.key === "Enter") {
        const codigo = event.target.value.trim();
        if (codigo) {
            window.location.href = "/buscar/" + codigo;
        }
    }
}

window.onload = function() {
    document.getElementById("scanner").focus();
};
</script>

</head>
<body>

<div class="box">
    <h2>Escanear muestra</h2>
    <input id="scanner" onkeypress="buscarCodigo(event)" autocomplete="off" autofocus>
</div>

</body>
</html>
