<!doctype html>
<html>

<head>

    <meta charset="utf-8" />
    <title>Dashboard de Muestras</title>

    <style>
        body {
            font-family: Arial;
            margin: 30px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            font-size: 14px;
        }

        th {
            background: #f5f5f5;
        }

        tr:hover {
            background: #fafafa;
        }

        .search {
            margin-bottom: 15px;
        }

        input {
            padding: 8px;
            width: 250px;
        }
    </style>

</head>

<body>

    <h2>Dashboard de muestras</h2>

    <div class="search">
        <input id="buscar" placeholder="Buscar código o especie..." />
    </div>

    <table id="tabla">

        <thead>
            <tr>
                <th>ID</th>
                <th>Código</th>
                <th>Especie</th>
                <th>Caja</th>
                <th>Tubo</th>
                <th>Nivel</th>
                <th>Fecha</th>
                <th>Ver</th>
            </tr>
        </thead>

        <tbody>

            {% for m in muestras %}

            <tr>

                <td>{{ m.id }}</td>

                <td>{{ m.codigo_barra }}</td>

                <td>{{ m.codigo_utn_especie }}</td>

                <td>{{ m.numero_caja }}</td>

                <td>{{ m.numero_tubo_en_caja }}</td>

                <td>{{ m.nivel }}</td>

                <td>{{ m.created_at }}</td>

                <td>
                    <a href="/muestras/{{ m.id }}">abrir</a>
                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

    <script>

        const input = document.getElementById("buscar")

        input.addEventListener("keyup", function () {

            const filtro = input.value.toLowerCase()

            const filas = document.querySelectorAll("#tabla tbody tr")

            filas.forEach(f => {

                const texto = f.innerText.toLowerCase()

                f.style.display = texto.includes(filtro) ? "" : "none"

            })

        })

    </script>

</body>

</html>
