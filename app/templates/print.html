<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Imprimir etiqueta</title>

<style>
@page {
  size: 32mm 13mm;
  margin: 0;
}

html, body {
  margin: 0;
  padding: 0;
}

.label {
    width: 32mm;
    height: 13mm;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

img {
    width: 30mm;
    height: 8mm;
    object-fit: contain;
}

.codigo {
  font-size: 9px;
  font-weight: bold;
  margin-top: 1px;
}
</style>

<script>
window.onload = function() {
    window.print();
}
</script>

</head>
<body>
  <div class="label">
      <img src="{{ muestra.barcode_image }}">
      <div class="codigo">{{ muestra.codigo_barra }}</div>
  </div>
</body>
</html>
